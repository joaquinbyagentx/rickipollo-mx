<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú de domicilio — Ricki Pollo</title>
  <meta name="description" content="Menú de domicilio de Ricki Pollo en Puebla, ubicado en Zavaleta." />
  <link rel="canonical" href="https://rickipollo.mx/menu/rickipollo/" />
  <meta http-equiv="refresh" content="0; url=menu/rickipollo/" />
  <style>
    :root { --negro:#1e1e1e; --crema:#f4f0e8; --naranja:#d96a1b; --blanco:#fff; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--negro);
      color: var(--crema);
      text-align: center;
    }
    .card { max-width: 520px; }
    .logo {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(2rem, 8vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      margin-bottom: 16px;
    }
    .logo span { color: var(--naranja); }
    .logo-img { width: min(260px, 72vw); height: auto; margin: 0 auto 18px; }
    p { color: rgba(244,240,232,.82); line-height: 1.6; margin: 0 0 22px; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 22px;
      border-radius: 999px;
      background: var(--naranja);
      color: var(--blanco);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 12px 30px rgba(217,106,27,.28);
    }
  </style>
  <script>
    window.location.replace('menu/rickipollo/' + window.location.search + window.location.hash);

</head>

  <main class="card" aria-label="Redirección al menú de Ricki Pollo">

    <a href="menu/rickipollo/">Abrir menú</a>
  </main>
</body>
</html>
